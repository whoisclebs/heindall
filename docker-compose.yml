services:
  lb:
    image: ghcr.io/whoisclebs/heindall-lb:latest
    platform: linux/amd64
    environment:
      BIND_ADDR: 0.0.0.0:9999
      UPSTREAMS: api1:8080,api2:8080
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20MB"

  api1: &api
    image: ghcr.io/whoisclebs/heindall-api:latest
    platform: linux/amd64
    environment:
      PORT: 8080
      ANN_NPROBE: ${ANN_NPROBE:-8}
      ANN_AMBIGUOUS_NPROBE: ${ANN_AMBIGUOUS_NPROBE:-32}
      ANN_REPAIR: ${ANN_REPAIR:-true}
      GOMAXPROCS: ${GOMAXPROCS:-1}
      GOMEMLIMIT: ${GOMEMLIMIT:-128MiB}
      GOGC: ${GOGC:-1000}
    healthcheck:
      test: ["CMD", "/usr/local/bin/heindall-healthcheck"]
      interval: 10s
      timeout: 1s
      retries: 18
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

  api2:
    <<: *api
    depends_on: []

networks:
  default:
    driver: bridge
