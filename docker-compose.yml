services:
  lb:
    image: ghcr.io/whoisclebs/heindall-lb:c072e6ea53f0437ad36ad9cad923d03b3c2e8fbb
    platform: linux/amd64
    environment:
      BIND_ADDR: 0.0.0.0:9999
      UPSTREAMS: unix:///sockets/api1.sock,unix:///sockets/api2.sock
    volumes:
      - sockets:/sockets
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: "30MB"

  api1:
    image: ghcr.io/whoisclebs/heindall-api:c072e6ea53f0437ad36ad9cad923d03b3c2e8fbb
    platform: linux/amd64
    user: "0:0"
    environment:
      PORT: 8080
      SOCKET_PATH: /sockets/api1.sock
      ANN_NPROBE: ${ANN_NPROBE:-8}
      ANN_AMBIGUOUS_NPROBE: ${ANN_AMBIGUOUS_NPROBE:-24}
      ANN_REPAIR: ${ANN_REPAIR:-true}
      GOMAXPROCS: "1"
      GOMEMLIMIT: "120MiB"
    volumes:
      - sockets:/sockets
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD", "/usr/local/bin/heindall-healthcheck"]
      interval: 10s
      timeout: 1s
      retries: 18
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "160MB"

  api2:
    image: ghcr.io/whoisclebs/heindall-api:c072e6ea53f0437ad36ad9cad923d03b3c2e8fbb
    platform: linux/amd64
    user: "0:0"
    environment:
      PORT: 8080
      SOCKET_PATH: /sockets/api2.sock
      ANN_NPROBE: ${ANN_NPROBE:-8}
      ANN_AMBIGUOUS_NPROBE: ${ANN_AMBIGUOUS_NPROBE:-24}
      ANN_REPAIR: ${ANN_REPAIR:-true}
      GOMAXPROCS: "1"
      GOMEMLIMIT: "120MiB"
    volumes:
      - sockets:/sockets
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD", "/usr/local/bin/heindall-healthcheck"]
      interval: 10s
      timeout: 1s
      retries: 18
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "160MB"

networks:
  default:
    driver: bridge

volumes:
  sockets:
