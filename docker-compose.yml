services:
  lb:
    image: ghcr.io/whoisclebs/heindall-lb:latest
    environment:
      BIND_ADDR: 0.0.0.0:9999
      UPSTREAMS: api1:8080,api2:8080
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "24MB"

  api1: &api
    image: ghcr.io/whoisclebs/heindall-api:latest
    environment:
      PORT: 8080
      INDEX_PATH: /data/index.heindall.bin
      REFERENCES_PATH: /data/references.json.gz
      ANN_MIN_CANDIDATES: 128
    volumes:
      - ./data:/data:ro
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  api2:
    <<: *api
    depends_on: []

networks:
  default:
    driver: bridge
