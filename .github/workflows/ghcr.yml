name: Build and publish images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - uses: dtolnay/rust-toolchain@stable
      - run: go test ./...
        working-directory: apps/api
      - run: cargo test --manifest-path apps/load-balancer/Cargo.toml

  publish:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: deploy/Dockerfile.api
            image: ghcr.io/whoisclebs/heindall-api
          - name: lb
            dockerfile: deploy/Dockerfile.lb
            image: ghcr.io/whoisclebs/heindall-lb
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
